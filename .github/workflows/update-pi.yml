name: Update flake lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *" # Runs every 12 hours

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update flake.lock
        run: nix flake update

      - name: Update pi release hashes
        id: pi-release
        shell: bash
        run: |
          set -euo pipefail

          version="$(nix eval --raw .#packages.x86_64-linux.pi.version)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

          platforms=(darwin-arm64 darwin-x64 linux-arm64 linux-x64)
          tmp_hashes="$(mktemp)"

          {
            echo "# Generated by .github/workflows/update-pi.yml."
            echo "{"
          } > "${tmp_hashes}"

          for platform in "${platforms[@]}"; do
            url="https://github.com/earendil-works/pi/releases/download/v${version}/pi-${platform}.tar.gz"
            echo "Prefetching ${url}"

            if ! hash="$(nix-prefetch-url --unpack "${url}")"; then
              echo "::notice::pi v${version} release asset is not available: ${url}"
              echo "::notice::Leaving flake.lock and pi-release-hashes.nix unchanged."
              rm -f "${tmp_hashes}"
              git checkout -- flake.lock pi-release-hashes.nix
              echo "release_available=false" >> "${GITHUB_OUTPUT}"
              echo "hashes_changed=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            printf '  %s = "%s";\n' "${platform}" "${hash}" >> "${tmp_hashes}"
          done

          echo "}" >> "${tmp_hashes}"
          mv "${tmp_hashes}" pi-release-hashes.nix

          echo "release_available=true" >> "${GITHUB_OUTPUT}"
          if git diff --quiet -- pi-release-hashes.nix; then
            echo "hashes_changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "hashes_changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit and push changes
        if: steps.pi-release.outputs.release_available == 'true' && steps.pi-release.outputs.hashes_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add flake.lock pi-release-hashes.nix

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update flake.lock and pi release hashes"
          git push origin HEAD:main
